plugins {
    id 'application'
    id 'java'

}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.8.1'
    // Source: https://mvnrepository.com/artifact/org.seleniumhq.selenium/selenium-java
    implementation 'org.seleniumhq.selenium:selenium-java:4.21.0'
    // Source: https://mvnrepository.com/artifact/org.testng/testng
    testImplementation 'org.testng:testng:7.11.0'
}

application {
    mainClass = 'org.example.Main'
}
test{
    useTestNG()
}
jar{
    manifest {
        attributes('main-class':'org.examplr.main')
    }

}
tasks.register('prepareDocs', Copy) {
    description = 'Copies HTML, CSS, and images to the docs folder.'
    group = 'documentation'

    from('src/main/resources ') {
        include '**/*.html', '**/*.css', '**/*.js', '**/*.png', '**/*.jpg', '**/*.jpeg', '**/*.gif', '**/*.svg'
    }
    into("$rootDir/docs")
}
